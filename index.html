<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c0b1d">
  <title>Секретний чат... ❤️ </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Quiz gate — always in HTML, hidden for local dev via JS -->
  <div id="password-gate" class="password-gate">
    <div class="pg-bg-hearts" id="pg-bg-hearts"></div>

    <!-- Scene 1: Date -->
    <div id="pg-s1" class="pg-box">
      <div class="pg-badge">🔐 Крок 1 з 2</div>
      <div class="pg-emoji" id="pg-emo-1">🗓️</div>
      <div class="pg-title" style="white-space:nowrap">Юстинка, пройди невеликий тест! 😏</div>
      <div class="pg-q">Коли ми вперше зустрілись? 🙂</div>
      <div class="pg-date-row">
        <div class="pg-date-col">
          <input id="pg-d" class="pg-din" type="tel" inputmode="numeric" placeholder="ДД" maxlength="2" autocomplete="off">
          <span class="pg-dlbl">день</span>
        </div>
        <span class="pg-dsep">/</span>
        <div class="pg-date-col">
          <input id="pg-m" class="pg-din" type="tel" inputmode="numeric" placeholder="ММ" maxlength="2" autocomplete="off">
          <span class="pg-dlbl">місяць</span>
        </div>
        <span class="pg-dsep">/</span>
        <div class="pg-date-col">
          <input id="pg-y" class="pg-din pg-din-y" type="tel" inputmode="numeric" placeholder="РРРР" maxlength="4" autocomplete="off">
          <span class="pg-dlbl">рік</span>
        </div>
      </div>
      <button id="pg-b1" class="pg-btn">Далі →</button>
      <div id="pg-e1" class="pg-err"></div>
    </div>

    <!-- Scene 2: Venue -->
    <div id="pg-s2" class="pg-box pg-scene-hidden">
      <div class="pg-badge">✨ Крок 2 з 2</div>
      <div class="pg-emoji" id="pg-emo-2">☕</div>
      <div class="pg-q">В якому закладі ми були в цей день? 😏</div>
      <input id="pg-v" class="pg-tin" type="text" placeholder="назва закладу"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button id="pg-b2" class="pg-btn">Відкрити чат ❤️</button>
      <div id="pg-e2" class="pg-err"></div>
    </div>
  </div>

  <div id="app" style="visibility:hidden">

    <!-- Starfield -->
    <div class="starfield" id="starfield"></div>

    <!-- Floating hearts (chat background) -->
    <div class="pg-bg-hearts" id="chat-hearts"></div>

    <!-- Chat Header -->
    <div class="chat-header" id="chat-header">
      <div class="header-back">←</div>
      <div class="header-avatar-wrap">
        <img src="photos/me1.JPG" alt="" class="header-avatar">
        <span class="online-dot"></span>
      </div>
      <div class="header-info">
        <div class="header-name">Володя ❤️ 🐻 </div>
        <div class="header-status" id="header-status">онлайн</div>
      </div>
      <div class="header-icons">
        <span>📞</span>
        <span>⋮</span>
      </div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="chat-messages"></div>

    <!-- Action Buttons -->
    <div id="action-area" class="action-area"></div>

    <!-- Finale Overlay -->
    <div id="finale" class="finale-overlay hidden">
      <canvas id="confetti-canvas"></canvas>
      <div class="pg-bg-hearts" id="finale-hearts"></div>
      <div class="finale-content">
        <div class="finale-emoji" id="finale-emoji"><span class="ring-band">💍</span><span class="ring-gem">💍</span></div>
        <div class="finale-title" id="finale-title"></div>
        <div class="slideshow-container" id="slideshow-container">
          <div id="slideshow" class="slideshow"></div>
          <div class="slide-overlay"></div>
        </div>
        <div class="finale-love" id="finale-love"></div>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <!-- Tiny flag file (15 bytes) — tells us production mode without blocking render -->
  <script src="data.enc.js"></script>

  <script>
  /* ----- BOOTSTRAP ----- */
  if (typeof _ENC === 'undefined') {
    /* Local dev: hide gate, show app, load script.js directly */
    document.getElementById('password-gate').style.display = 'none';
    document.getElementById('app').style.visibility = '';
    var _s = document.createElement('script');
    _s.src = 'script.js';
    document.head.appendChild(_s);
  } else {
    /* Production: 2-scene quiz gate
       Password = DDMMYYYY + venue.toLowerCase().trim()
    */
    (function () {
      const _gate = document.getElementById('password-gate');

      /* Fetch starts NOW — in background while user goes through scenes */
      const _encData = fetch('data.enc').then(r => {
        if (!r.ok) throw new Error('fetch failed');
        return r.arrayBuffer();
      });

      /* Binary parser: ENC1 + salt(16) + entries[keyLen(2)+key+iv(12)+dataLen(4)+data] */
      function _parse(buf) {
        const view = new DataView(buf);
        if (new TextDecoder().decode(new Uint8Array(buf, 0, 4)) !== 'ENC1')
          throw new Error('Invalid file');
        let off = 4;
        const salt = new Uint8Array(buf.slice(off, off + 16)); off += 16;
        const entries = {};
        while (off < buf.byteLength) {
          const klen = view.getUint16(off); off += 2;
          const key  = new TextDecoder().decode(new Uint8Array(buf, off, klen)); off += klen;
          const iv   = new Uint8Array(buf.slice(off, off + 12)); off += 12;
          const dlen = view.getUint32(off); off += 4;
          const data = new Uint8Array(buf.slice(off, off + dlen)); off += dlen;
          entries[key] = { iv, data };
        }
        return { salt, entries };
      }

      function _mime(name) {
        return /\.png$/i.test(name) ? 'image/png'
             : /\.gif$/i.test(name) ? 'image/gif'
             : /\.webp$/i.test(name) ? 'image/webp'
             : 'image/jpeg';
      }

      async function _deriveKey(pw, salt) {
        const raw = await crypto.subtle.importKey(
          'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
        return crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
          raw, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
      }

      /* Parse once, reuse in both steps */
      const _parsed = _encData.then(buf => _parse(buf));

      /* Step 1 crypto: validate date against __date_check__ entry */
      async function _checkDate(dateStr) {
        const { salt, entries } = await _parsed;
        const dc = entries['__date_check__'];
        if (!dc) return; /* old bundle without check — skip */
        const key = await _deriveKey(dateStr, salt);
        await crypto.subtle.decrypt({ name: 'AES-GCM', iv: dc.iv }, key, dc.data);
        /* throws if wrong key → date is invalid */
      }

      /* Step 2: decrypt photos + script and launch the app */
      async function _unlock(pw) {
        const { salt, entries } = await _parsed;
        const key = await _deriveKey(pw, salt);

        const urlMap = {};
        for (const [name, { iv, data }] of Object.entries(entries)) {
          if (name === 'script.js' || name === '__date_check__') continue;
          const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
          urlMap[name] = URL.createObjectURL(new Blob([plain], { type: _mime(name) }));
        }

        const se = entries['script.js'];
        const scriptBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: se.iv }, key, se.data);
        const scriptText = new TextDecoder().decode(scriptBuf);

        const blob    = new Blob([scriptText], { type: 'application/javascript' });
        const blobUrl = URL.createObjectURL(blob);
        const s = document.createElement('script');
        s.src = blobUrl;
        s.onload = () => {
          URL.revokeObjectURL(blobUrl);
          for (const g of Object.keys(PHOTOS))
            PHOTOS[g] = PHOTOS[g].map(p => urlMap[p.split('/').pop()] || p);
          const ha = document.querySelector('.header-avatar');
          if (ha) ha.src = urlMap[ha.getAttribute('src').split('/').pop()] || ha.src;
          document.getElementById('app').style.visibility = '';
          _gate.style.transition = 'opacity 0.6s';
          _gate.style.opacity = '0';
          setTimeout(() => { _gate.remove(); init(); }, 630);
        };
        document.head.appendChild(s);
      }

      /* ---- UI elements ---- */
      const _s1  = document.getElementById('pg-s1');
      const _s2  = document.getElementById('pg-s2');
      const _b1  = document.getElementById('pg-b1');
      const _b2  = document.getElementById('pg-b2');
      const _e1  = document.getElementById('pg-e1');
      const _e2  = document.getElementById('pg-e2');
      const _pd  = document.getElementById('pg-d');
      const _pm  = document.getElementById('pg-m');
      const _py  = document.getElementById('pg-y');
      const _pv  = document.getElementById('pg-v');

      let _dateStr  = '';
      let _errCount = 0;

      /* ---- Helpers ---- */
      function _shake(el) {
        gsap.killTweensOf(el, 'x');
        gsap.fromTo(el, { x: -10 }, {
          x: 10, duration: 0.06, ease: 'none',
          yoyo: true, repeat: 7,
          onComplete: () => gsap.set(el, { x: 0 }),
        });
      }

      function _floatEmoji(id) {
        const el = document.getElementById(id);
        if (!el) return;
        gsap.killTweensOf(el);
        gsap.fromTo(el,
          { scale: 0, rotation: -18 },
          { scale: 1, rotation: 0, duration: 0.48, ease: 'back.out(2.6)', delay: 0.12 }
        );
        gsap.to(el, { y: -9, duration: 1.9, ease: 'sine.inOut', yoyo: true, repeat: -1, delay: 0.65 });
      }

      /* ---- Background floating hearts ---- */
      (function _spawnHearts() {
        const c   = document.getElementById('pg-bg-hearts');
        if (!c) return;
        const pool = ['❤️','💕','💖','💗','🩷','💝'];
        for (let i = 0; i < 14; i++) {
          const el  = document.createElement('div');
          el.className = 'pg-heart';
          el.textContent = pool[Math.floor(Math.random() * pool.length)];
          const size = 16 + Math.random() * 22;
          const dur  = 3 + Math.random() * 3.5;
          el.style.cssText = [
            `left:${4 + Math.random() * 92}%`,
            `top:${10 + Math.random() * 80}%`,
            `font-size:${size}px`,
            `--d:${dur.toFixed(1)}s`,
            `--del:${(-dur + Math.random() * dur).toFixed(1)}s`,
          ].join(';');
          c.appendChild(el);
        }
      })();

      /* ---- Scene 1 entry ---- */
      gsap.set(_s1, { opacity: 0, y: 48, scale: 0.9 });
      gsap.to(_s1, { opacity: 1, y: 0, scale: 1, duration: 0.62, ease: 'back.out(1.9)', delay: 0.15 });
      _floatEmoji('pg-emo-1');
      setTimeout(() => _pd.focus(), 800);

      /* Auto-advance date fields */
      _pd.addEventListener('input', () => { if (_pd.value.length >= 2) _pm.focus(); });
      _pm.addEventListener('input', () => { if (_pm.value.length >= 2) _py.focus(); });

      /* ---- Scene 1 → Scene 2 transition ---- */
      function _toScene2() {
        gsap.to(_s1, { opacity: 0, duration: 0.25, ease: 'power2.in',
          onComplete: () => {
            _s1.classList.add('pg-scene-hidden');
            _s2.classList.remove('pg-scene-hidden');
            gsap.fromTo(_s2, { opacity: 0 }, { opacity: 1, duration: 0.3, ease: 'power2.out' });
            _floatEmoji('pg-emo-2');
            setTimeout(() => _pv.focus(), 350);
          },
        });
      }

      /* ---- Scene 1 submit ---- */
      async function _s1Next() {
        const d = _pd.value.trim(), m = _pm.value.trim(), y = _py.value.trim();
        if (!d || !m || !y) {
          _e1.textContent = 'Введи день, місяць і рік 😅';
          _shake(_s1); return;
        }
        const di = parseInt(d), mi = parseInt(m), yi = parseInt(y);
        if (di < 1 || di > 31 || mi < 1 || mi > 12 || yi < 2000 || yi > 2099) {
          _e1.textContent = 'Хм, така дата виглядає підозріло 🤔';
          _shake(_s1); return;
        }
        const candidate = String(di).padStart(2,'0') + String(mi).padStart(2,'0') + String(yi);
        _b1.disabled = true;
        _b1.textContent = 'Перевіряю...';
        _e1.textContent = '';
        try {
          await _checkDate(candidate);
          _dateStr = candidate;
          _b1.disabled = false;
          _b1.textContent = 'Далі →';
          _toScene2();
        } catch {
          _b1.disabled = false;
          _b1.textContent = 'Далі →';
          _e1.textContent = 'Невірна дата 🙈 Спробуй ще раз! 😅';
          _pd.value = ''; _pm.value = ''; _py.value = '';
          _shake(_s1);
          _pd.focus();
        }
      }

      /* ---- Scene 2 submit ---- */
      async function _s2Submit() {
        const venue = _pv.value.trim();
        if (!venue) {
          _e2.textContent = 'Треба вписати назву закладу 😄';
          _shake(_s2); return;
        }
        _b2.disabled = true;
        _b2.textContent = 'Відкриваю наш чат...';
        _e2.textContent = '';
        try {
          await _unlock(_dateStr + venue.toLowerCase());
        } catch {
          _errCount++;
          _b2.disabled = false;
          _b2.textContent = 'Відкрити чат ❤️';
          _pv.value = '';
          /* Date is correct — stay on scene 2, just retry the venue */
          const hints = [
            'Хм, не той заклад 🫠 Спробуй ще раз! 😄',
            'Та ні... 😄 Ще раз, ти точно знаєш! 😄',
            'Ти точно не памʼятаєш? 🫣 Та ну!',
          ];
          _e2.textContent = hints[Math.min(_errCount - 1, hints.length - 1)];
          _shake(_s2);
          _pv.focus();
        }
      }

      /* ---- Event listeners ---- */
      _b1.addEventListener('click', _s1Next);
      _b2.addEventListener('click', _s2Submit);
      _py.addEventListener('keydown', e => { if (e.key === 'Enter') _s1Next(); });
      _pv.addEventListener('keydown', e => { if (e.key === 'Enter') _s2Submit(); });
    })();
  }
  </script>
</body>
</html>
