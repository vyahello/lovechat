<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c0b1d">
  <title>Юстинка... 💍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- Starfield -->
    <div class="starfield" id="starfield"></div>

    <!-- Chat Header -->
    <div class="chat-header" id="chat-header">
      <div class="header-back">←</div>
      <div class="header-avatar-wrap">
        <img src="main_photos/me.JPG" alt="Volodya" class="header-avatar">
        <span class="online-dot"></span>
      </div>
      <div class="header-info">
        <div class="header-name">Володя 🐻❤️</div>
        <div class="header-status" id="header-status">онлайн</div>
      </div>
      <div class="header-icons">
        <span>📞</span>
        <span>⋮</span>
      </div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="chat-messages"></div>

    <!-- Action Buttons -->
    <div id="action-area" class="action-area"></div>

    <!-- Finale Overlay -->
    <div id="finale" class="finale-overlay hidden">
      <canvas id="confetti-canvas"></canvas>
      <div class="finale-content">
        <div class="finale-emoji" id="finale-emoji">💍</div>
        <div class="finale-title" id="finale-title"><span>Ну все, ти попала</span> 😘💍</div>
        <div class="slideshow-container" id="slideshow-container">
          <div id="slideshow" class="slideshow"></div>
          <div class="slide-overlay"></div>
        </div>
        <div class="finale-love" id="finale-love">Люблю тебе <span class="heart-beat">❤️</span></div>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
